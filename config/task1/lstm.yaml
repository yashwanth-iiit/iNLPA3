data:
  plain_file: "data/plain.txt"
  cipher_file: "data/cipher_00.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_plain_len: 256
  max_cipher_len: 512

model:
  type: "lstm"
  embedding_dim: 64
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3

training:
  epochs: 20
  batch_size: 64
  learning_rate: 0.001
  clip_grad_norm: 1.0
  teacher_forcing_ratio: 0.5

logging:
  wandb_project: "inlp-a3"
  wandb_run_name: "task1_lstm"

output:
  checkpoint_dir: "checkpoints/task1/lstm"
  checkpoint_file: "checkpoints/task1/lstm/best.pt"
  results_file: "outputs/results/task1_lstm.txt"
  huggingface_repo: ""
