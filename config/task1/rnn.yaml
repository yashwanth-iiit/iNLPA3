data:
  plain_file: "data/plain.txt"
  cipher_file: "data/cipher_00.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_plain_len: 64
  max_cipher_len: 128

model:
  type: "rnn"
  embedding_dim: 64
  hidden_dim: 512
  num_layers: 2
  dropout: 0.3

training:
  epochs: 15
  batch_size: 128
  learning_rate: 0.001
  clip_grad_norm: 1.0
  teacher_forcing_ratio: 0.8

logging:
  wandb_project: "inlp-a3"
  wandb_run_name: "task1_rnn"

output:
  checkpoint_dir: "checkpoints/task1/rnn"
  checkpoint_file: "checkpoints/task1/rnn/best.pt"
  results_file: "outputs/results/task1_rnn.txt"
  huggingface_repo: "yashwanthiiith/inlp-a3"
