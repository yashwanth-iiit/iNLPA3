data:
  plain_file: "data/plain.txt"
  cipher_files:
    - "data/cipher_01.txt"
    - "data/cipher_02.txt"
    - "data/cipher_03.txt"
    - "data/cipher_04.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_plain_len: 64
  max_cipher_len: 128

decryption:
  model_type: "lstm"
  checkpoint: "checkpoints/task1/lstm/best.pt"
  huggingface_repo: "yashwanthiiith/inlp-a3"

language_model:
  model_type: "bilstm"
  checkpoint: "checkpoints/task2/bilstm/best.pt"
  huggingface_repo: "yashwanthiiith/inlp-a3"

logging:
  wandb_project: "inlp-a3"
  wandb_run_name: "task3_bilstm"

output:
  results_file: "outputs/results/task3_bilstm.txt"
